name: Gas Price Scraper NYC

on:
  schedule:
    - cron: '0 21 * * *'  # 17:00 hora Nueva York (UTC-4 verano)
  workflow_dispatch:       # Ejecucion manual desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Chrome y ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear estructura de directorios
        run: |
          mkdir -p data/raw/retail
          mkdir -p data/raw/wholesale
          mkdir -p data/raw/logs
          mkdir -p data/processed
          mkdir -p data/reference

      - name: Ejecutar scraper GasBuddy NYC
        run: |
          cd src
          python collect_gasbuddy.py

      - name: Guardar datos en repositorio
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update: precios gasolina NYC $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
